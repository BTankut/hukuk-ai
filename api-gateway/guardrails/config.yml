# NeMo Guardrails configuration — SAFE DEFAULT (Phase 2 P0)
#
# Amaç:
#  - Presidio/KVKK maskeleme (input + output)
#  - Self check input ile yalnızca açıkça uygunsuz / kapsam dışı girişleri elemek
#
# Bilinçli olarak DEVRE DIŞI (varsayılan):
#  - self_check_output
#  - self_check_facts
#  - self_check_hallucination
#  - output-level citation blocking

models:
  - type: main
    engine: openai
    model: ${DGX_MODEL}
    parameters:
      base_url: ${DGX_BASE_URL}
      api_key: ${DGX_API_KEY}
      temperature: 0.1

  - type: self_check_input
    engine: openai
    model: ${DGX_MODEL}
    parameters:
      base_url: ${DGX_BASE_URL}
      api_key: ${DGX_API_KEY}
      temperature: 0.0

rails:
  input:
    flows:
      - self check input
      - mask sensitive input

  output:
    flows:
      - mask sensitive output
