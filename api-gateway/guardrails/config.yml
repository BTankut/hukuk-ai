# NeMo Guardrails configuration — SAFE DEFAULT (Phase 2 P0)
#
# Amaç:
#  - Presidio/KVKK maskeleme (input + output)
#  - Python pipeline içindeki deterministik input moderation
#
# Bilinçli olarak DEVRE DIŞI (varsayılan):
#  - NeMo `self check input` (dgxnode2 llama.cpp runtime false-positive drift)
#  - self_check_output
#  - self_check_facts
#  - self_check_hallucination
#  - output-level citation blocking

models:
  - type: main
    engine: openai
    model: ${DGX_MODEL}
    parameters:
      base_url: ${DGX_BASE_URL}
      api_key: ${DGX_API_KEY}
      temperature: 0.1

rails:
  input:
    flows:
      - mask sensitive input

  output:
    flows:
      - mask sensitive output
