			$('input[type="number"]').keyup(function(e) {
				if (/\D/g.test(this.value)) {
					// Filter non-digits from input value.
					this.value = this.value.replace(/\D/g, '');
				}
			});
			//prevent e,+,-,\,
			$('input[type="number"]').keydown(
					function(e) {
						var preventedKeyNumbers = [ 69, 107, 189, 109, 110, 16,
								190, 188 ];
						if (preventedKeyNumbers.indexOf(e.which) > -1) {
							e.preventDefault();
						} else if (e.shiftKey && e.which === 52) { //shift and +
							e.preventDefault();
						}
					});

			$('input[type="number"]').bind('copy paste', function(e) {
				e.preventDefault();
			});
		};

			div.innerHTML = "<input type=\"search\" class=\"form-control input-sm\" name=\""+inputId+"\" id=\""+inputId+"\" placeholder=\"Kelime giriniz.\" onSearch=\"onSearch(event,this,"+btnId+");\"\>";
			var button = document.createElement('DIV');
			button.setAttribute("class",
					"btn btn-icon-only btn-Turkuaz ml-4 mt-1");
			button.setAttribute("id", btnId);
			button.setAttribute("onclick", funcName)
			button.innerHTML = "Kelime Ekle";
			$(parentClass)[0].appendChild(div);

		};
