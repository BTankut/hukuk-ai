name: closed-runtime-gates

on:
  pull_request:
  push:
    branches:
      - bt/mevzuat-engine-closure

jobs:
  closed-runtime-gates:
    runs-on: ubuntu-latest
    env:
      JUDICIAL_RUNTIME_ENABLED: "false"
      JUDICIAL_CORPUS_GATE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install api gateway test dependencies
        run: python -m pip install -e "api-gateway[dev]"

      - name: Check closed runtime state
        run: python scripts/ci/check_closed_runtime_state.py

      - name: Run runtime-disabled judicial smoke tests
        working-directory: api-gateway
        run: >-
          python -m pytest
          tests/test_judicial_corpus_prep.py
          tests/test_chat_router.py::TestChatCompletionsNonStreaming::test_case_law_query_refuses_before_generation
          -q
